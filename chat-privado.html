<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Privado - Trato Seguro CL</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }

        .chat-header {
            background-color: #1a1a2e;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .btn-volver {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
        }

        .btn-volver:hover { background: rgba(255,255,255,0.25); }

        .chat-usuario-info { display: flex; align-items: center; gap: 12px; }

        .chat-avatar-header {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #28a745;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-nombre-header { font-size: 16px; font-weight: 700; }
        .chat-estado { font-size: 12px; opacity: 0.7; margin-top: 2px; }

        .chat-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Panel izquierdo - conversaciones */
        .conversaciones-panel {
            width: 280px;
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .conversaciones-titulo {
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            border-bottom: 1px solid #eee;
        }

        .conversaciones-lista { overflow-y: auto; flex: 1; }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        .conv-item:hover { background: #f8f9fa; }
        .conv-item.activo { background: #e9f7e9; }

        .conv-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .conv-info { flex: 1; overflow: hidden; }
        .conv-nombre { font-size: 14px; font-weight: 600; color: #1a1a2e; }
        .conv-ultimo { font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .sin-convs { text-align: center; color: #999; padding: 30px 20px; font-size: 13px; }

        /* Panel derecho - mensajes */
        .mensajes-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
        }

        .mensajes-vacio {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 15px;
            flex-direction: column;
            gap: 10px;
        }

        .mensajes-lista {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mensajes-lista::-webkit-scrollbar { width: 6px; }
        .mensajes-lista::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .mensaje { display: flex; gap: 8px; align-items: flex-end; }
        .mensaje.propio { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .mensaje.propio .msg-avatar { background: #28a745; }

        .msg-burbuja {
            max-width: 60%;
            background: white;
            padding: 10px 14px;
            border-radius: 0 12px 12px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .mensaje.propio .msg-burbuja {
            background: #1a1a2e;
            color: white;
            border-radius: 12px 0 12px 12px;
        }

        .msg-texto { font-size: 14px; line-height: 1.5; }
        .msg-hora { font-size: 11px; color: #999; margin-top: 4px; }
        .mensaje.propio .msg-hora { color: rgba(255,255,255,0.6); }

        .chat-input-area {
            padding: 14px 16px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: Arial, sans-serif;
            max-height: 100px;
        }

        .chat-input-area textarea:focus { border-color: #1a1a2e; }

        .btn-enviar {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-enviar:hover { background: #28a745; }

        @media (max-width: 600px) {
            .conversaciones-panel { width: 80px; }
            .conv-info { display: none; }
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="javascript:history.back()" class="btn-volver">← Volver</a>
        <div class="chat-usuario-info">
            <div class="chat-avatar-header" id="header-avatar">?</div>
            <div>
                <div class="chat-nombre-header" id="header-nombre">Selecciona una conversación</div>
                <div class="chat-estado">Chat Privado</div>
            </div>
        </div>
    </div>

    <div class="chat-body">

        <div class="conversaciones-panel">
            <div class="conversaciones-titulo">💬 Mensajes</div>
            <div class="conversaciones-lista" id="conversaciones-lista">
                <p class="sin-convs">Cargando conversaciones...</p>
            </div>
        </div>

        <div class="mensajes-panel" id="mensajes-panel">
            <div class="mensajes-vacio" id="mensajes-vacio">
                <span style="font-size:40px">💬</span>
                <p>Selecciona una conversación o inicia una nueva</p>
            </div>

            <div class="mensajes-lista" id="mensajes-lista" style="display:none"></div>

            <div class="chat-input-area" id="chat-input" style="display:none">
                <textarea id="input-mensaje" placeholder="Escribe un mensaje..." rows="1"></textarea>
                <button class="btn-enviar" id="btn-enviar">Enviar ➤</button>
            </div>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const usuarioActual = localStorage.getItem('usuario');

        if (!token || !usuarioActual) {
            alert('Debes iniciar sesión');
            window.location.href = 'login.html';
        }

        const socket = io(API_URL);
        let usuarioActivo = null;

        // Ver si viene con un usuario desde la URL
        const params = new URLSearchParams(window.location.search);
        const userParam = params.get('user');

        async function cargarConversaciones() {
            try {
                const respuesta = await fetch(`${API_URL}/api/conversaciones`, {
                    headers: { 'authorization': token }
                });
                const convs = await respuesta.json();

                const lista = document.getElementById('conversaciones-lista');

                if (convs.length === 0 && !userParam) {
                    lista.innerHTML = '<p class="sin-convs">No tienes conversaciones aún</p>';
                    return;
                }

                lista.innerHTML = convs.map(c => `
                    <div class="conv-item" onclick="abrirChat('${c.username}', '${c.nombre}')">
                        <div class="conv-avatar">${c.username.charAt(0).toUpperCase()}</div>
                        <div class="conv-info">
                            <div class="conv-nombre">@${c.username}</div>
                            <div class="conv-ultimo">${c.ultimo_mensaje || 'Sin mensajes aún'}</div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.log('Error:', error);
            }
        }

        async function abrirChat(username, nombre) {
            usuarioActivo = username;

            document.getElementById('header-avatar').textContent = username.charAt(0).toUpperCase();
            document.getElementById('header-nombre').textContent = '@' + username;
            document.getElementById('mensajes-vacio').style.display = 'none';
            document.getElementById('mensajes-lista').style.display = 'flex';
            document.getElementById('chat-input').style.display = 'flex';

            document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('activo'));

            try {
                const respuesta = await fetch(`${API_URL}/api/mensajes/${username}`, {
                    headers: { 'authorization': token }
                });
                const mensajes = await respuesta.json();

                const lista = document.getElementById('mensajes-lista');
                lista.innerHTML = '';

                if (mensajes.length === 0) {
                    lista.innerHTML = '<p style="text-align:center; color:#999; padding:20px">Sé el primero en escribir 👋</p>';
                } else {
                    mensajes.forEach(m => agregarMensaje(m.remitente_username, m.texto, m.fecha));
                }

                lista.scrollTop = lista.scrollHeight;

            } catch (error) {
                console.log('Error:', error);
            }
        }

        function agregarMensaje(remitente, texto, fecha) {
            const esPropio = remitente === usuarioActual;
            const lista = document.getElementById('mensajes-lista');

            const div = document.createElement('div');
            div.className = 'mensaje' + (esPropio ? ' propio' : '');

            const hora = fecha ? new Date(fecha).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }) : 'Ahora';

            div.innerHTML = `
                <div class="msg-avatar">${remitente.charAt(0).toUpperCase()}</div>
                <div class="msg-burbuja">
                    <div class="msg-texto">${texto}</div>
                    <div class="msg-hora">${hora}</div>
                </div>
            `;

            lista.appendChild(div);
            lista.scrollTop = lista.scrollHeight;
        }

        async function enviarMensaje() {
            const texto = document.getElementById('input-mensaje').value.trim();
            if (!texto || !usuarioActivo) return;

            try {
                await fetch(`${API_URL}/api/mensajes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'authorization': token
                    },
                    body: JSON.stringify({ destinatario: usuarioActivo, texto })
                });

                agregarMensaje(usuarioActual, texto, null);
                document.getElementById('input-mensaje').value = '';

                socket.emit('mensaje-privado', {
                    de: usuarioActual,
                    para: usuarioActivo,
                    texto
                });

            } catch (error) {
                console.log('Error:', error);
            }
        }

        socket.on('mensaje-privado', (datos) => {
            if (datos.de === usuarioActivo) {
                agregarMensaje(datos.de, datos.texto, null);
            }
        });

        document.getElementById('btn-enviar').addEventListener('click', enviarMensaje);

        document.getElementById('input-mensaje').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });

        cargarConversaciones();

        if (userParam) {
            abrirChat(userParam, userParam);
        }
    </script>
</body>
</html>
