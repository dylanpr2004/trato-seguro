<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Público - Trato Seguro CL</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        .chat-header {
            background-color: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-volver {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-volver:hover { background: rgba(255,255,255,0.25); }

        .chat-header h1 { font-size: 18px; font-weight: 600; }
        .chat-header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
        .chat-icon { font-size: 28px; }

        .usuarios-online {
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
        }

        .dot-verde {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #28a745;
            border-radius: 50%;
            margin-right: 6px;
        }

        .chat-wrapper {
            max-width: 860px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .chat-box {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .chat-mensajes {
            height: 480px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-mensajes::-webkit-scrollbar { width: 6px; }
        .chat-mensajes::-webkit-scrollbar-track { background: #f1f1f1; }
        .chat-mensajes::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .mensaje {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .mensaje.propio { flex-direction: row-reverse; }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 15px;
            flex-shrink: 0;
        }

        .mensaje.propio .avatar { background: #28a745; }

        .burbuja { max-width: 65%; }

        .burbuja-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .mensaje.propio .burbuja-header { flex-direction: row-reverse; }

        .nombre-usuario { font-size: 13px; font-weight: 600; color: #1a1a2e; }
        .mensaje.propio .nombre-usuario { color: #28a745; }
        .hora { font-size: 11px; color: #999; }

        .texto-mensaje {
            background: #f0f2f5;
            padding: 10px 14px;
            border-radius: 0 12px 12px 12px;
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        .mensaje.propio .texto-mensaje {
            background: #1a1a2e;
            color: white;
            border-radius: 12px 0 12px 12px;
        }

        .chat-input-area {
            border-top: 1px solid #eee;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fafafa;
        }

        .chat-input-area textarea {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: Arial, sans-serif;
            max-height: 100px;
            transition: border 0.2s;
        }

        .chat-input-area textarea:focus { border-color: #1a1a2e; }

        .btn-enviar {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-enviar:hover { background: #28a745; }

        .aviso-comunidad {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 12px;
        }

        .mensaje-vacio {
            text-align: center;
            color: #999;
            margin: auto;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="chat-header-left">
            <a href="index.html" class="btn-volver">← Volver al Inicio</a>
            <span class="chat-icon">💬</span>
            <div>
                <h1>Chat Público de la Comunidad</h1>
                <p>Espacio abierto para todos los usuarios de Trato Seguro CL</p>
            </div>
        </div>
        <div class="usuarios-online">
            <span class="dot-verde"></span> En línea
        </div>
    </div>

    <div class="chat-wrapper">
        <div class="chat-box">
            <div class="chat-mensajes" id="chat-mensajes">
                <p class="mensaje-vacio">Cargando mensajes... 💬</p>
            </div>

            <div class="chat-input-area">
                <textarea id="input-mensaje" placeholder="Escribe tu mensaje... (Sé respetuoso 🙏)" rows="1"></textarea>
                <button class="btn-enviar" id="btn-enviar">Enviar ➤</button>
            </div>
        </div>

        <p class="aviso-comunidad">⚠️ Este es un espacio público. Sé respetuoso con todos los usuarios.</p>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const usuario = localStorage.getItem('usuario');

        if (!token || !usuario) {
            alert('Debes iniciar sesión para usar el Chat Público');
            window.location.href = 'login.html';
        }

        const socket = io(API_URL);
        const contenedor = document.getElementById('chat-mensajes');
        const inputMensaje = document.getElementById('input-mensaje');
        const btnEnviar = document.getElementById('btn-enviar');

        socket.on('historial', (mensajes) => {
            contenedor.innerHTML = '';
            if (mensajes.length === 0) {
                contenedor.innerHTML = '<p class="mensaje-vacio">Sé el primero en escribir algo 👋</p>';
                return;
            }
            mensajes.forEach(m => agregarMensaje(m));
            contenedor.scrollTop = contenedor.scrollHeight;
        });

        socket.on('mensaje', (mensaje) => {
            agregarMensaje(mensaje);
            contenedor.scrollTop = contenedor.scrollHeight;
        });

        function agregarMensaje(m) {
            const esPropio = m.usuario === usuario;
            const div = document.createElement('div');
            div.className = 'mensaje' + (esPropio ? ' propio' : '');
            div.innerHTML = `
             <a href="perfil-publico.html?user=${m.usuario}" class="avatar" style="text-decoration:none">${m.usuario.charAt(0).toUpperCase()}</a>
            <div class="burbuja">
            <div class="burbuja-header">
            <a href="perfil-publico.html?user=${m.usuario}" class="nombre-usuario" style="text-decoration:none">@${m.usuario}</a>
            <span class="hora">${m.hora}</span>
            </div>
            <div class="texto-mensaje">${m.texto}</div>
             </div>
         `;
            contenedor.appendChild(div);
        }

        function enviarMensaje() {
            const texto = inputMensaje.value.trim();
            if (!texto) return;
            socket.emit('mensaje', { usuario, texto });
            inputMensaje.value = '';
        }

        btnEnviar.addEventListener('click', enviarMensaje);

        inputMensaje.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviarMensaje();
            }
        });
    </script>
</body>
</html>
