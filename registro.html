<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Trato Seguro CL</title>
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>
    
    <main class="login-main">
        <section class="login-box">
            <h2>Crear Cuenta en Trato Seguro CL</h2>
            <p class="security-note">✅ Registro rápido y seguro. Verificamos tu identidad para proteger tu dinero.</p>

            <form action="/api/registro" method="POST" id="registro-form">
                
                <div class="input-group">
                    <label for="full-name">Nombre Completo</label>
                    <input type="text" id="full-name" name="full-name" required placeholder="Juan Pérez">
                </div>

                <div class="input-group">
                    <label for="rut">RUT (Ej: 12.345.678-K)</label>
                    <input type="text" id="rut" name="rut" required placeholder="Necesario para validación de cuenta">
                </div>

                <div class="input-group">
                    <label for="email-reg">Correo Electrónico</label>
                    <input type="email" id="email-reg" name="email" required placeholder="ejemplo@correo.cl">
                </div>
                
               <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Repite la contraseña" required>
                    </div>

                <div class="terms-check">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">Acepto los <a href="/terminos" target="_blank">Términos y Condiciones</a></label>
                </div>

                <button type="submit" class="button-primary">Registrarme y Vender Seguro</button>

                <div class="login-links">
                    <a href="login.html">¿Ya tienes cuenta? Inicia sesión aquí</a>
                </div>
                <form action="index.html" method="GET" id="registro-form">
    </form>
            </form>
        </section>
    </main>
   <script>
    document.getElementById('registro-form').addEventListener('submit', async function(event) {
        event.preventDefault();

        const nombre = document.getElementById('full-name').value;
        const email = document.getElementById('email-reg').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        // Verificar que las contraseñas coincidan
        if (password !== confirmPassword) {
            alert('⚠️ Las contraseñas no coinciden');
            return;
        }

        try {
            const respuesta = await fetch('http://localhost:3000/api/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, email, password })
            });

            const datos = await respuesta.json();

            if (respuesta.ok) {
                alert('¡Registro exitoso! Bienvenido a Trato Seguro CL');
                window.location.href = 'login.html';
            } else {
                alert('Error: ' + datos.error);
            }

        } catch (error) {
            alert('No se pudo conectar con el servidor');
        }
    });
    </script>
    </body>
</html>
