<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigos - Shopseguro</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; }

        .page-header {
            background-color: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .btn-volver {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-volver:hover { background: rgba(255,255,255,0.25); }

        .page-wrapper {
            max-width: 860px;
            margin: 28px auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .seccion {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        .seccion-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .seccion-titulo {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .badge-count {
            background: #1a1a2e;
            color: white;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-count.pendiente { background: #dc3545; }

        .seccion-lista { padding: 8px 0; }

        .item-usuario {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.15s;
        }

        .item-usuario:last-child { border-bottom: none; }
        .item-usuario:hover { background: #fafafa; }

        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
            text-decoration: none;
        }

        .avatar.verde { background: #28a745; }

        .info-usuario { flex: 1; }
        .nombre-usuario {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            text-decoration: none;
        }
        .nombre-usuario:hover { text-decoration: underline; }
        .username-tag { font-size: 12px; color: #888; margin-top: 2px; }

        .acciones { display: flex; gap: 8px; }

        .btn-accion {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-accion:hover { opacity: 0.85; }
        .btn-aceptar { background: #28a745; color: white; }
        .btn-rechazar { background: #f0f2f5; color: #555; }
        .btn-mensaje { background: #1a1a2e; color: white; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-eliminar { background: #f0f2f5; color: #dc3545; }

        .vacio {
            text-align: center;
            padding: 30px 20px;
            color: #aaa;
            font-size: 14px;
        }

        .cargando {
            text-align: center;
            padding: 24px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <div class="page-header">
        <a href="index.html" class="btn-volver">← Volver al Inicio</a>
        <h1 style="font-size:18px;">👥 Mis Amigos</h1>
    </div>

    <div class="page-wrapper">

        <!-- Solicitudes Pendientes -->
        <div class="seccion">
            <div class="seccion-header">
                <span class="seccion-titulo">🔔 Solicitudes Pendientes</span>
                <span class="badge-count pendiente" id="badge-pendientes">0</span>
            </div>
            <div class="seccion-lista" id="lista-pendientes">
                <p class="cargando">Cargando...</p>
            </div>
        </div>

        <!-- Lista de Amigos -->
        <div class="seccion">
            <div class="seccion-header">
                <span class="seccion-titulo">✅ Mis Amigos</span>
                <span class="badge-count" id="badge-amigos">0</span>
            </div>
            <div class="seccion-lista" id="lista-amigos">
                <p class="cargando">Cargando...</p>
            </div>
        </div>

    </div>

    <script src="config.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const usuarioActual = localStorage.getItem('usuario');

        if (!token || !usuarioActual) {
            alert('Debes iniciar sesión para ver tus amigos');
            window.location.href = 'login.html';
        }

        async function cargarAmigos() {
            try {
                const respuesta = await fetch(`${API_URL}/api/amigos`, {
                    headers: { 'authorization': token }
                });

                if (!respuesta.ok) {
                    throw new Error('Error al cargar');
                }

                const datos = await respuesta.json();

                // ── Solicitudes pendientes ──
                const listaPendientes = document.getElementById('lista-pendientes');
                const badgePendientes = document.getElementById('badge-pendientes');

                badgePendientes.textContent = datos.pendientes.length;

                if (datos.pendientes.length === 0) {
                    listaPendientes.innerHTML = '<p class="vacio">No tienes solicitudes pendientes 👌</p>';
                } else {
                    listaPendientes.innerHTML = datos.pendientes.map(p => `
                        <div class="item-usuario" id="pendiente-${p.id}">
                            <a href="perfil-publico.html?user=${p.username}" class="avatar">
                                ${p.username.charAt(0).toUpperCase()}
                            </a>
                            <div class="info-usuario">
                                <a href="perfil-publico.html?user=${p.username}" class="nombre-usuario">${p.nombre}</a>
                                <div class="username-tag">@${p.username}</div>
                            </div>
                            <div class="acciones">
                                <button class="btn-accion btn-aceptar" onclick="responder(${p.id}, 'aceptar', '${p.username}')">✅ Aceptar</button>
                                <button class="btn-accion btn-rechazar" onclick="responder(${p.id}, 'rechazar', '${p.username}')">✖ Rechazar</button>
                            </div>
                        </div>
                    `).join('');
                }

                // ── Lista de amigos ──
                const listaAmigos = document.getElementById('lista-amigos');
                const badgeAmigos = document.getElementById('badge-amigos');

                badgeAmigos.textContent = datos.amigos.length;

                if (datos.amigos.length === 0) {
                    listaAmigos.innerHTML = '<p class="vacio">Aún no tienes amigos. ¡Agrega a alguien desde su perfil! 👀</p>';
                } else {
                    listaAmigos.innerHTML = datos.amigos.map(a => `
                        <div class="item-usuario" id="amigo-${a.username}">
                            <a href="perfil-publico.html?user=${a.username}" class="avatar verde">
                                ${a.username.charAt(0).toUpperCase()}
                            </a>
                            <div class="info-usuario">
                                <a href="perfil-publico.html?user=${a.username}" class="nombre-usuario">${a.nombre}</a>
                                <div class="username-tag">@${a.username}</div>
                            </div>
                            <div class="acciones">
                                <a href="chat-privado.html?user=${a.username}" class="btn-accion btn-mensaje">✉️ Mensaje</a>
                                <button class="btn-accion btn-eliminar" onclick="eliminarAmigo('${a.username}')">Eliminar</button>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (error) {
                document.getElementById('lista-pendientes').innerHTML = '<p class="vacio">No se pudo cargar. Verifica que el servidor esté encendido.</p>';
                document.getElementById('lista-amigos').innerHTML = '<p class="vacio">No se pudo cargar.</p>';
            }
        }

        async function responder(solicitudId, accion, username) {
            try {
                const respuesta = await fetch(`${API_URL}/api/amigos/responder`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'authorization': token
                    },
                    body: JSON.stringify({ solicitudId, accion })
                });

                const datos = await respuesta.json();

                if (respuesta.ok) {
                    // Quitar el item de la lista visualmente
                    const item = document.getElementById(`pendiente-${solicitudId}`);
                    if (item) item.remove();

                    // Actualizar badge pendientes
                    const badge = document.getElementById('badge-pendientes');
                    badge.textContent = Math.max(0, parseInt(badge.textContent) - 1);

                    if (accion === 'aceptar') {
                        alert(`✅ ¡Ahora eres amigo de @${username}!`);
                        cargarAmigos(); // Recargar para mostrar el nuevo amigo
                    } else {
                        alert(`Solicitud de @${username} rechazada`);
                    }
                } else {
                    alert('Error: ' + datos.error);
                }
            } catch (error) {
                alert('No se pudo conectar con el servidor');
            }
        }

        async function eliminarAmigo(username) {
            if (!confirm(`¿Seguro que quieres eliminar a @${username} de tus amigos?`)) return;

            try {
                const respuesta = await fetch(`${API_URL}/api/amigos/${username}`, {
                    method: 'DELETE',
                    headers: { 'authorization': token }
                });

                const datos = await respuesta.json();

                if (respuesta.ok) {
                    const item = document.getElementById(`amigo-${username}`);
                    if (item) item.remove();

                    const badge = document.getElementById('badge-amigos');
                    badge.textContent = Math.max(0, parseInt(badge.textContent) - 1);

                    alert(`@${username} eliminado de tus amigos`);
                } else {
                    alert('Error: ' + datos.error);
                }
            } catch (error) {
                alert('No se pudo conectar con el servidor');
            }
        }

        cargarAmigos();
    </script>
</body>
</html>
